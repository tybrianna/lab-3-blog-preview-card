<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

  <link rel="stylesheet" href="styles.scss">

  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>

<body style="background-color: #f5d04e;">
  <div class="container d-flex justify-content-center align-items-center vh-100 vw-100">
    
    <div class="container-fluid card text-center"
      style="width: 20rem; height: 35rem; padding: 1rem; border-radius: 20px; border: 1px solid black; box-shadow: 12px 12px 0px black;">

      <img src="./assets/images/illustration-article.svg" alt="Equilibrium image" class="equilibrium-image"

      <br>
      
        <span class="badge bg-warning text-dark">Learning</span>

      <br>
     
      <p style="text-align: left; font-weight: 300rem;">Published 21 Dec 2023</p>

      <h2 style="text-align: left;">HTML & CSS foundations</h2>

      <p style="font-size: small; text-align: left;">These languages are the backbone of every website, defining structure, content, and presentation.</p>

      <img src="./assets/images/image-avatar.webp" alt="Michelle avatar" class="avatar size-50"
        style="width: 50px; height: 50px;">

      <p id="name" style="font-size: large; font-weight: bold;">Greg Hooper</p>

    </div>

  </div>
